<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shriram Bioseed – Prize & Spin</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow+Condensed:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#D4A017;--gold-lt:#FFD966;--dark:#1A0800;--brown:#3B1200;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--dark);}

/* ═══ BG ═══ */
.hero{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 100% 80% at 50% 20%,#7B2A00 0%,#3B1200 35%,#1A0800 70%,#0D0400 100%);}
.hero-bg::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(105deg,transparent 0,transparent 18px,rgba(212,160,23,.04) 18px,rgba(212,160,23,.04) 19px),repeating-linear-gradient(75deg,transparent 0,transparent 24px,rgba(212,160,23,.03) 24px,rgba(212,160,23,.03) 25px);}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 40%,rgba(0,0,0,.5) 100%);}
.rays{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none;}
.rays::before{content:'';position:absolute;top:0;left:50%;width:280%;height:280%;transform:translate(-50%,-30%);background:conic-gradient(from 0deg,transparent 0deg,rgba(212,160,23,.06) 3deg,transparent 6deg,transparent 22deg,rgba(212,160,23,.04) 25deg,transparent 28deg,transparent 44deg,rgba(212,160,23,.06) 47deg,transparent 50deg,transparent 66deg,rgba(212,160,23,.04) 69deg,transparent 72deg,transparent 88deg,rgba(212,160,23,.06) 91deg,transparent 94deg,transparent 110deg,rgba(212,160,23,.04) 113deg,transparent 116deg,transparent 132deg,rgba(212,160,23,.06) 135deg,transparent 138deg,transparent 154deg,rgba(212,160,23,.04) 157deg,transparent 160deg,transparent 176deg,rgba(212,160,23,.06) 179deg,transparent 182deg,transparent 198deg,rgba(212,160,23,.04) 201deg,transparent 204deg,transparent 220deg,rgba(212,160,23,.06) 223deg,transparent 226deg,transparent 242deg,rgba(212,160,23,.04) 245deg,transparent 248deg,transparent 264deg,rgba(212,160,23,.06) 267deg,transparent 270deg,transparent 286deg,rgba(212,160,23,.04) 289deg,transparent 292deg,transparent 308deg,rgba(212,160,23,.06) 311deg,transparent 314deg,transparent 330deg,rgba(212,160,23,.04) 333deg,transparent 336deg,transparent 352deg,rgba(212,160,23,.06) 355deg,transparent 358deg,transparent 360deg);animation:spinRays 80s linear infinite;}
@keyframes spinRays{to{transform:translate(-50%,-30%) rotate(360deg);}}
.fx{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.cf{position:absolute;top:-20px;animation:cfFall linear infinite;opacity:0;}
@keyframes cfFall{0%{transform:translateY(-30px) rotate(0deg);opacity:0;}8%{opacity:1;}92%{opacity:.7;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
.sp{position:absolute;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:var(--gold-lt);animation:twk ease-in-out infinite;}
@keyframes twk{0%,100%{opacity:.1;transform:scale(.6) rotate(0);}50%{opacity:1;transform:scale(1.6) rotate(20deg);}}

/* ═══ HOME BTN — golden ═══ */
.home-btn{
  position:fixed;top:14px;left:14px;z-index:200;
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#D4A017,#FF8F00);
  border:none;border-radius:50px;
  padding:9px 20px 9px 14px;
  color:#1A0800;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:1.5px;
  text-decoration:none;
  box-shadow:0 4px 18px rgba(212,160,23,.55),0 0 30px rgba(212,160,23,.2);
  transition:all .22s ease;
}
.home-btn:hover{background:linear-gradient(135deg,#FFD700,#FF6B00);transform:translateX(-3px) scale(1.05);box-shadow:0 6px 28px rgba(212,160,23,.75);}
.home-btn svg{width:16px;height:16px;fill:#1A0800;}

/* ═══ CONTENT ═══ */
.content{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:8px 16px 10px;}

/* ═══ LOGOS — enlarged ═══ */
.header-logos{width:100%;max-width:960px;display:flex;justify-content:space-between;align-items:center;}
.logo-left,.logo-right{height:clamp(70px,10.5vw,108px);object-fit:contain;filter:drop-shadow(0 2px 12px rgba(212,160,23,.6));animation:logoPulse 3.5s ease-in-out infinite;}
.logo-right{animation-delay:1s;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 2px 10px rgba(212,160,23,.4));}50%{filter:drop-shadow(0 2px 28px rgba(212,160,23,.95)) drop-shadow(0 0 50px rgba(212,160,23,.45));}}

/* ═══ PRIZE IMAGE (no text labels) ═══ */
.prize-img-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.prize-img{
  width:clamp(500px,100vw,550px);
  object-fit:contain;
  mix-blend-mode:lighten;
  filter:drop-shadow(0 12px 36px rgba(0,0,0,.8)) drop-shadow(0 0 24px rgba(212,160,23,.35));
  animation:floatUp 3.5s ease-in-out infinite;
}
@keyframes floatUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

/* ═══ DIVIDER ═══ */
.divider{display:flex;align-items:center;width:100%;max-width:560px;gap:10px;}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.45),transparent);}
.div-txt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;letter-spacing:3px;color:rgba(255,210,100,.5);text-transform:uppercase;white-space:nowrap;}

/* ═══ CARD ZONE ═══ */
.card-zone{position:relative;width:100%;max-width:340px;flex-shrink:0;display:flex;align-items:center;justify-content:center;min-height:clamp(190px,26vh,270px);}

/* ── PRIZE CARD (image only + spin button) ── */
.pcard-wrap{width:100%;max-width:290px;position:relative;border-radius:20px;cursor:pointer;}
.pcard-wrap::before{content:'';position:absolute;inset:-2px;border-radius:21px;background:conic-gradient(from 0deg,#D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017);opacity:0;transition:opacity .35s;z-index:0;animation:bSpin 2.5s linear infinite;}
.pcard-wrap:hover::before{opacity:1;}
@keyframes bSpin{0%{background:conic-gradient(from 0deg,#D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017);}50%{background:conic-gradient(from 180deg,#D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017);}100%{background:conic-gradient(from 360deg,#D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017);}}
.pcard{position:relative;z-index:1;width:100%;border-radius:18px;overflow:hidden;background:linear-gradient(160deg,rgba(80,30,5,.55),rgba(30,10,0,.75) 60%,rgba(10,5,0,.88));backdrop-filter:blur(20px);border:1.5px solid rgba(212,160,23,.28);box-shadow:inset 0 1px 0 rgba(255,200,80,.18),0 8px 32px rgba(0,0,0,.6);transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;}
.pcard-wrap:hover .pcard{transform:translateY(-10px) scale(1.035);box-shadow:inset 0 1px 0 rgba(255,200,80,.28),0 22px 55px rgba(0,0,0,.7),0 0 55px rgba(212,160,23,.22);}
.pcard::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,200,80,.14) 50%,transparent 70%);transform:translateX(-100%);transition:transform 0s;z-index:2;pointer-events:none;}
.pcard-wrap:hover .pcard::after{transform:translateX(100%);transition:transform .6s;}
.pcard-spotlight{position:absolute;top:0;left:50%;transform:translateX(-50%);width:75%;height:50px;background:radial-gradient(ellipse at 50% 0%,rgba(255,160,30,.28),transparent 75%);z-index:1;pointer-events:none;animation:sFl 3.5s ease-in-out infinite;}
@keyframes sFl{0%,100%{opacity:.6;}50%{opacity:1;}}
.pcard-body{padding:12px 16px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:3;}
/* Card image — large */
.pcard-img{
  width:clamp(110px,15vw,160px);height:clamp(110px,15vw,160px);
  object-fit:contain;mix-blend-mode:lighten;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.7));
  animation:floatUp 3.5s ease-in-out infinite;
  transition:filter .3s,transform .3s;
}
.pcard-wrap:hover .pcard-img{filter:drop-shadow(0 10px 28px rgba(212,160,23,.7)) drop-shadow(0 0 24px rgba(212,160,23,.4));transform:scale(1.1) translateY(-6px);}
.pcard-hint{width:100%;padding:11px;border-radius:10px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#D4A017,#FF6B00);color:#1a0500;box-shadow:0 4px 16px rgba(212,160,23,.5);position:relative;overflow:hidden;text-align:center;cursor:pointer;}
.pcard-hint::before{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.4);transform:skewX(-20deg);animation:sheen 3s ease-in-out infinite;z-index:1;}
@keyframes sheen{0%,25%{left:-60%;opacity:0;}27%{opacity:1;}52%{left:130%;opacity:0;}100%{left:130%;opacity:0;}}

/* ═══ WHEEL ═══ */
#wheel-zone{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:20;}
#wheel-zone.active{display:flex;}
.wheel-outer-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.wheel-halo{position:relative;display:flex;align-items:center;justify-content:center;}
.wheel-halo::before{content:'';position:absolute;inset:-28px;border-radius:50%;background:radial-gradient(circle,rgba(212,160,23,.18),transparent 70%);animation:halo 2s ease-in-out infinite;z-index:0;}
@keyframes halo{0%,100%{transform:scale(.95);opacity:.7;}50%{transform:scale(1.1);opacity:1;}}
.wheel-container{position:relative;width:clamp(230px,32vw,310px);height:clamp(230px,32vw,310px);cursor:pointer;z-index:1;}
.wheel-container canvas{display:block;border-radius:50%;}
.wheel-pointer{position:absolute;top:-24px;left:50%;transform:translateX(-50%);z-index:10;width:28px;height:48px;}
.wheel-pointer::before{content:'';position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:32px solid #D4A017;filter:drop-shadow(0 0 12px rgba(255,200,0,.9)) drop-shadow(0 0 24px rgba(255,120,0,.6));}
.wheel-pointer::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#FFD700 50%,#D4A017 100%);box-shadow:0 0 16px rgba(255,220,0,.9),0 0 32px rgba(255,160,0,.5);animation:pPulse 1.5s ease-in-out infinite;}
@keyframes pPulse{0%,100%{box-shadow:0 0 12px rgba(255,220,0,.8),0 0 24px rgba(255,160,0,.4);}50%{box-shadow:0 0 22px rgba(255,240,0,1),0 0 44px rgba(255,200,0,.8),0 0 60px rgba(255,100,0,.3);}}
.wheel-label{font-family:'Barlow Condensed',sans-serif;font-size:clamp(12px,1.8vw,15px);font-weight:900;color:rgba(255,210,100,.8);letter-spacing:3px;text-transform:uppercase;animation:wlPulse 1.5s ease-in-out infinite;text-shadow:0 0 20px rgba(212,160,23,.6);}
@keyframes wlPulse{0%,100%{opacity:.5;}50%{opacity:1;}}

/* ═══ REVEAL BTN ═══ */
#reveal-btn-wrap{display:none;position:fixed;bottom:0;left:0;right:0;height:50vh;align-items:center;justify-content:center;z-index:100;pointer-events:none;}
#reveal-btn-wrap.show{display:flex;}
#reveal-btn{pointer-events:all;padding:18px 52px;border-radius:60px;border:none;background:linear-gradient(135deg,#D4A017 0%,#FF6B00 40%,#C0000A 100%);color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(16px,2.5vw,24px);letter-spacing:2px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(212,120,0,.6);animation:rPop .5s cubic-bezier(.34,1.56,.64,1) both,rGlow 2.4s ease-in-out .5s infinite;transition:transform .25s,box-shadow .25s;text-shadow:0 2px 8px rgba(0,0,0,.4);}
@keyframes rPop{0%{transform:scale(.5) translateY(40px);opacity:0;}70%{transform:scale(1.08) translateY(-6px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
@keyframes rGlow{0%,100%{box-shadow:0 0 0 4px rgba(212,160,23,.15),0 8px 32px rgba(212,100,0,.55);}50%{box-shadow:0 0 0 14px rgba(212,160,23,.08),0 12px 55px rgba(212,100,0,.8),0 0 100px rgba(212,160,23,.45);}}
#reveal-btn:hover{transform:translateY(-6px) scale(1.06);}
#reveal-btn::before{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.28);transform:skewX(-22deg);animation:sheen 3.5s ease-in-out infinite;}

/* ═══ MODAL ═══ */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center;padding:14px;}
#modal-overlay.open{display:flex;}
.modal{position:relative;background:linear-gradient(145deg,rgba(40,12,0,.98),rgba(20,6,0,.99) 60%,rgba(35,10,0,.98));border:1.5px solid rgba(212,160,23,.35);border-radius:24px;padding:20px 20px 16px;width:min(96vw,760px);overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,200,80,.1);animation:mIn .45s cubic-bezier(.34,1.4,.64,1);}
.modal::before{content:'';position:absolute;top:0;left:-60%;right:-60%;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.6) 35%,rgba(255,220,100,.9) 50%,rgba(212,160,23,.6) 65%,transparent);}
@keyframes mIn{0%{transform:scale(.82) translateY(50px);opacity:0;}70%{transform:scale(1.02) translateY(-3px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(15px,2.4vw,21px);background:linear-gradient(135deg,#FFD966,#D4A017,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1.5px;}
.modal-close{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(212,160,23,.35);background:rgba(212,160,23,.07);color:rgba(212,160,23,.8);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1);}
.modal-close:hover{background:rgba(212,160,23,.18);border-color:rgba(212,160,23,.7);color:var(--gold-lt);transform:scale(1.15) rotate(90deg);}

/* ── SINGLE WINNER CARD ── */
.winner-single{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0;}
.winner-big-num{font-family:'Russo One',sans-serif;font-size:clamp(40px,7vw,64px);background:linear-gradient(135deg,#FFD966,#D4A017,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:nPop .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes nPop{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
.winner-trophy{font-size:38px;animation:tSway 2s ease-in-out infinite;}
@keyframes tSway{0%,100%{transform:rotate(-5deg) scale(1);}50%{transform:rotate(5deg) scale(1.1);}}
.winner-card-single{background:linear-gradient(135deg,rgba(212,160,23,.12),rgba(255,100,0,.06));border:1.5px solid rgba(212,160,23,.35);border-radius:18px;padding:18px 28px;text-align:center;width:100%;max-width:440px;animation:cSlide .4s cubic-bezier(.34,1.2,.64,1) both;box-shadow:0 0 30px rgba(212,160,23,.1),inset 0 1px 0 rgba(255,200,80,.1);}
@keyframes cSlide{0%{transform:translateY(18px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.w-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,3.5vw,34px);font-weight:900;color:#fff;letter-spacing:1px;}
.w-mobile{font-size:clamp(13px,1.8vw,16px);color:rgba(255,220,120,.7);font-weight:700;margin-top:4px;}
.w-loc{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,1.8vw,16px);font-weight:900;color:rgba(212,160,23,.8);letter-spacing:.8px;margin-top:2px;}

/* ── WINNERS TABLE (3rd & Consolation) ── */
.winners-table{width:100%;border-collapse:separate;border-spacing:0 5px;}
.winners-table thead th{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(10px,1.4vw,13px);letter-spacing:2px;text-transform:uppercase;color:rgba(212,160,23,.6);padding:5px 10px 8px;text-align:left;border-bottom:1px solid rgba(212,160,23,.18);}
.winners-table tbody tr{background:rgba(255,255,255,.03);transition:background .25s,transform .25s;animation:cSlide .3s ease both;}
.winners-table tbody tr:hover{background:linear-gradient(100deg,rgba(212,160,23,.1),rgba(255,100,0,.04));transform:translateY(-2px);}
.winners-table tbody td{padding:10px 10px;font-size:clamp(11px,1.5vw,14px);color:rgba(255,255,255,.82);vertical-align:middle;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(0,0,0,.1);}
.winners-table tbody td:first-child{border-radius:10px 0 0 10px;border-left:1px solid rgba(255,255,255,.04);}
.winners-table tbody td:last-child{border-radius:0 10px 10px 0;border-right:1px solid rgba(255,255,255,.04);}
.row-num{width:30px;height:30px;border-radius:50%;background:rgba(212,160,23,.12);border:1.5px solid rgba(212,160,23,.3);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:rgba(212,160,23,.8);}
.winners-table tbody tr:hover .row-num{background:rgba(212,160,23,.22);border-color:rgba(212,160,23,.7);color:var(--gold-lt);}
.td-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,1.8vw,16px);font-weight:900;color:rgba(255,255,255,.9);}
.td-mobile{color:rgba(255,220,120,.65);font-weight:700;font-size:clamp(11px,1.4vw,13px);}
.td-district{font-weight:700;color:rgba(255,255,255,.55);font-size:clamp(11px,1.4vw,13px);}
.td-state{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(12px,1.5vw,14px);letter-spacing:.5px;color:rgba(212,160,23,.75);}
/* Top winner highlight */
.winners-table tbody tr.top-win{background:linear-gradient(100deg,rgba(212,160,23,.15),rgba(255,100,0,.07));}
.winners-table tbody tr.top-win .row-num{background:linear-gradient(135deg,#D4A017,#FF6B00);border-color:var(--gold-lt);color:#1a0500;}

/* Navigation */
.carousel-nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;}
.page-info-wrap{text-align:center;flex:1;}
.page-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;display:block;}
.page-num{font-family:'Russo One',sans-serif;font-size:clamp(15px,2.2vw,20px);background:linear-gradient(135deg,#FFD966,#D4A017);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-of{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;color:rgba(255,255,255,.22);letter-spacing:1px;}
.nav-btn{padding:9px 20px;border-radius:50px;border:1.5px solid rgba(212,160,23,.3);background:rgba(212,160,23,.05);color:rgba(212,160,23,.7);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;letter-spacing:1.5px;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);}
.nav-btn:hover:not(:disabled){background:rgba(212,160,23,.15);border-color:rgba(212,160,23,.65);color:var(--gold-lt);transform:translateY(-2px) scale(1.05);box-shadow:0 6px 20px rgba(212,160,23,.22);}
.nav-btn:disabled{opacity:.2;cursor:not-allowed;}
</style>
</head>
<body>

<a class="home-btn" href="index.html">
  <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  HOME
</a>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="rays"></div>
  <div class="fx" id="fx"></div>

  <div class="content">

    <!-- LOGOS -->
    <div class="header-logos">
      <img src="https://raw.githubusercontent.com/projectquicksilver/Shriram_Bioseed-Lucky-Draw/main/Shriram_bioseed_logo1_left_side.png" alt="Shriram Bioseed" class="logo-left">
      <img src="https://raw.githubusercontent.com/projectquicksilver/Shriram_Bioseed-Lucky-Draw/main/Shriram_bioseed_logo2_right_side.png" alt="Mera Bioseed Mera Vishwas" class="logo-right">
    </div>

    <!-- PRIZE IMAGE ONLY — no text labels -->
    <div class="prize-img-wrap">
      <img id="prize-img" src="" alt="Prize" class="prize-img">
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="div-line"></div>
      <span class="div-txt" id="div-label">✦ Click Card to Spin ✦</span>
      <div class="div-line"></div>
    </div>

    <!-- CARD / WHEEL -->
    <div class="card-zone">

      <div class="pcard-wrap" id="card-wrap">
        <div class="pcard">
          <div class="pcard-spotlight"></div>
          <div class="pcard-body">
            <img id="card-img" src="" alt="prize" class="pcard-img">
            <div class="pcard-hint">🎰 Click to Spin the Wheel!</div>
          </div>
        </div>
      </div>

      <div id="wheel-zone">
        <div class="wheel-outer-wrap">
          <div class="wheel-halo">
            <div class="wheel-container" id="wheel-container">
              <div class="wheel-pointer"></div>
              <canvas id="wheel-canvas"></canvas>
            </div>
          </div>
          <div class="wheel-label" id="wheel-label">✦ TAP THE WHEEL TO SPIN ✦</div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- REVEAL BUTTON -->
<div id="reveal-btn-wrap">
  <button id="reveal-btn" onclick="openModal()">🏆 &nbsp;REVEAL WINNERS!</button>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">🏆 Lucky Draw Winners</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="carousel-content"></div>
    <div class="carousel-nav">
      <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">← Prev</button>
      <div class="page-info-wrap">
        <span class="page-label" id="page-label">Winner</span>
        <span class="page-num" id="page-num">1</span>
        <span class="page-of" id="page-of">of 2</span>
      </div>
      <button class="nav-btn" id="next-btn" onclick="changePage(1)">Next →</button>
    </div>
  </div>
</div>

<script src="audio.js"></script>
<script>
/* ══ PRIZE CONFIG ══ */
const GH='https://raw.githubusercontent.com/projectquicksilver/Shriram_Bioseed-Lucky-Draw/main/';
const prizes={
  0:{img:GH+'Mega_Prize.png',     rank:'🏆 MEGA PRIZE',   csv:'mega_prize.csv',        pageSize:1},
  1:{img:GH+'1st_prize.png',      rank:'🥇 1ST PRIZE',    csv:'1st_prize.csv',         pageSize:1},
  2:{img:GH+'2nd_Prize.png',      rank:'🥈 2ND PRIZE',    csv:'2nd_prize.csv',         pageSize:1},
  3:{img:GH+'3rd_Prize.png',      rank:'🥉 3RD PRIZE',    csv:'3rd_prize.csv',         pageSize:5},
  4:{img:GH+'Consolation_Prize.png',rank:'🎁 4th Prize',csv:'consolation_prize.csv', pageSize:10}
};

const params=new URLSearchParams(location.search);
const prizeId=parseInt(params.get('prize'));
const prize=prizes[prizeId]||prizes[1];

document.getElementById('prize-img').src=prize.img;
document.getElementById('card-img').src=prize.img;
document.getElementById('modal-title').textContent=`🏆 ${prize.rank} — Winners`;

/* FX particles */
(function(){
  const L=document.getElementById('fx');
  const C=['#D4A017','#FFD966','#FF6B00','#FF3B3B','#FFF5DC','#B87333','#FF9060'];
  for(let i=0;i<50;i++){const e=document.createElement('div');e.className='cf';const c=C[i%C.length],w=4+Math.random()*9,h=w*(Math.random()>.4?2.5:1);e.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*11}s;animation-duration:${7+Math.random()*9}s;`;L.appendChild(e);}
  for(let i=0;i<16;i++){const s=document.createElement('div');s.className='sp';const sz=3+Math.random()*9;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*95}%;width:${sz}px;height:${sz}px;animation-delay:${Math.random()*4}s;animation-duration:${1.5+Math.random()*3}s;`;L.appendChild(s);}
})();

/* ══ CARD → WHEEL ══ */
document.getElementById('card-wrap').addEventListener('click',function(){
  if(window.LuckyAudio)LuckyAudio.whoosh();
  this.style.display='none';
  document.getElementById('wheel-zone').classList.add('active');
  document.getElementById('div-label').textContent='✦ Tap Wheel to Spin ✦';
  initWheel();
});

/* ══ VIBRANT WHEEL ══ */
let spinning=false,wheelAngle=0,wheelDrawn=false;

const SEGS=[
  {color:'#FF1744',light:'#FF6B6B',icon:'🏆'},
  {color:'#FF6D00',light:'#FFB04D',icon:'🌟'},
  {color:'#FFD600',light:'#FFE96B',icon:'💎'},
  {color:'#00C853',light:'#69F0AE',icon:'🎯'},
  {color:'#2979FF',light:'#82B1FF',icon:'🎊'},
  {color:'#D500F9',light:'#EA80FC',icon:'🔥'},
  {color:'#FF4081',light:'#FF80AB',icon:'⚡'},
  {color:'#00BCD4',light:'#80DEEA',icon:'🎁'},
  {color:'#76FF03',light:'#CCFF90',icon:'🚀'},
  {color:'#FF6B00',light:'#FFAB40',icon:'🎰'},
];
const NS=SEGS.length;
let emojiImgs=[];

function preload(cb){
  emojiImgs=[];let done=0;
  SEGS.forEach((seg,i)=>{
    const off=document.createElement('canvas');off.width=off.height=72;
    const c=off.getContext('2d');c.font='58px serif';c.textAlign='center';c.textBaseline='middle';c.fillText(seg.icon,36,40);
    const img=new Image();img.onload=()=>{emojiImgs[i]=img;done++;if(done===NS)cb();};img.src=off.toDataURL();
  });
}

function initWheel(){
  if(wheelDrawn)return;wheelDrawn=true;
  preload(()=>{
    const cv=document.getElementById('wheel-canvas');
    const S=Math.min(document.querySelector('.wheel-container').offsetWidth,310);
    cv.width=S;cv.height=S;drawWheel(cv,wheelAngle);
  });
  document.getElementById('wheel-container').addEventListener('click',spinWheel);
}

function drawWheel(cv,angle){
  const ctx=cv.getContext('2d'),S=cv.width,cx=S/2,cy=S/2,R=S/2-10;
  const ARC=(Math.PI*2)/NS;
  ctx.clearRect(0,0,S,S);

  /* Metallic rim */
  ctx.save();ctx.shadowColor='rgba(255,200,0,.9)';ctx.shadowBlur=22;
  ctx.beginPath();ctx.arc(cx,cy,R+8,0,Math.PI*2);
  const rim=ctx.createLinearGradient(0,0,S,S);
  rim.addColorStop(0,'#FFD700');rim.addColorStop(.25,'#FFF8B0');rim.addColorStop(.5,'#D4A017');rim.addColorStop(.75,'#FFE680');rim.addColorStop(1,'#B8860B');
  ctx.fillStyle=rim;ctx.fill();ctx.restore();

  /* Rim dots */
  for(let d=0;d<40;d++){
    const da=angle+(d/40)*Math.PI*2,isLit=d%2===0;
    const dx=cx+Math.cos(da)*(R+3),dy=cy+Math.sin(da)*(R+3);
    ctx.save();ctx.shadowColor=isLit?'rgba(255,240,100,1)':'rgba(0,0,0,.5)';ctx.shadowBlur=isLit?9:2;
    ctx.beginPath();ctx.arc(dx,dy,isLit?3.5:2,0,Math.PI*2);
    ctx.fillStyle=isLit?'#FFFFF0':'rgba(80,40,0,.8)';ctx.fill();ctx.restore();
  }

  /* Inner border ring */
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.strokeStyle='rgba(255,240,150,.8)';ctx.lineWidth=2;ctx.stroke();ctx.restore();

  /* Segments */
  for(let i=0;i<NS;i++){
    const start=angle+i*ARC-Math.PI/2,end=start+ARC;
    ctx.save();
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    grd.addColorStop(0,SEGS[i].light);grd.addColorStop(.55,SEGS[i].color);grd.addColorStop(1,dk(SEGS[i].color,55));
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,start,end);ctx.closePath();ctx.fillStyle=grd;ctx.fill();
    /* Sheen */
    const shGrd=ctx.createLinearGradient(cx+Math.cos(start)*R*.3,cy+Math.sin(start)*R*.3,cx+Math.cos(end)*R*.3,cy+Math.sin(end)*R*.3);
    shGrd.addColorStop(0,'rgba(255,255,255,.22)');shGrd.addColorStop(.5,'rgba(255,255,255,.06)');shGrd.addColorStop(1,'rgba(0,0,0,.1)');
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,start,end);ctx.closePath();ctx.fillStyle=shGrd;ctx.fill();
    ctx.restore();
    /* Divider */
    ctx.save();ctx.shadowColor='rgba(255,240,100,.5)';ctx.shadowBlur=4;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(start)*R,cy+Math.sin(start)*R);
    ctx.strokeStyle='rgba(255,230,80,.75)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  }

  /* Emoji icons */
  const iDist=R*.63,iSize=R*.36;
  for(let i=0;i<NS;i++){
    const midA=angle+i*ARC-Math.PI/2+ARC/2;
    const ix=cx+Math.cos(midA)*iDist,iy=cy+Math.sin(midA)*iDist;
    if(emojiImgs[i]){
      ctx.save();ctx.translate(ix,iy);ctx.rotate(midA+Math.PI/2);
      ctx.drawImage(emojiImgs[i],-iSize/2,-iSize/2,iSize,iSize);ctx.restore();
    }
  }

  /* Outer ring */
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='rgba(255,200,0,.6)';ctx.lineWidth=3;ctx.stroke();ctx.restore();

  /* Hub */
  const hR=R*.19;
  ctx.save();ctx.shadowColor='rgba(255,200,0,.8)';ctx.shadowBlur=18;
  ctx.beginPath();ctx.arc(cx,cy,hR+5,0,Math.PI*2);ctx.strokeStyle='rgba(255,220,80,.9)';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(cx,cy,hR,0,Math.PI*2);
  const hub=ctx.createRadialGradient(cx-hR*.3,cy-hR*.3,0,cx,cy,hR);
  hub.addColorStop(0,'#FFFDE7');hub.addColorStop(.35,'#FFD700');hub.addColorStop(.7,'#D4A017');hub.addColorStop(1,'#7A5500');
  ctx.fillStyle=hub;ctx.fill();ctx.restore();
  ctx.save();ctx.beginPath();ctx.arc(cx-hR*.25,cy-hR*.25,hR*.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();ctx.restore();
  ctx.save();ctx.font=`900 ${Math.round(hR*.55)}px 'Barlow Condensed',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#3B1200';ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=3;ctx.fillText('SPIN',cx,cy);ctx.restore();
}

function dk(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.max(0,((n>>16)&0xff)-a)},${Math.max(0,((n>>8)&0xff)-a)},${Math.max(0,(n&0xff)-a)})`;}

function spinWheel(){
  if(spinning)return;spinning=true;
  document.getElementById('wheel-label').textContent='🎰 SPINNING...';
  const cv=document.getElementById('wheel-canvas');
  const total=(Math.PI*2)*(6+Math.random()*5);
  const dur=4800,t0=performance.now(),a0=wheelAngle;
  const SEGARC=(Math.PI*2)/NS;let lastSeg=Math.floor(a0/SEGARC);
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const el=Math.min(now-t0,dur),t=el/dur;
    wheelAngle=a0+total*ease(t);
    const seg=Math.floor(wheelAngle/SEGARC);
    if(seg!==lastSeg){lastSeg=seg;if(window.LuckyAudio)LuckyAudio.tick();}
    drawWheel(cv,wheelAngle);
    if(el<dur)requestAnimationFrame(frame);
    else{spinning=false;onEnd();}
  }
  requestAnimationFrame(frame);
}

function onEnd(){
  if(window.LuckyAudio)LuckyAudio.ding();
  /* Simple clean completion — just update label and show reveal button after short delay */
  document.getElementById('wheel-label').textContent='🎉 SPIN COMPLETE!';
  setTimeout(()=>{
    const wz=document.getElementById('wheel-zone');
    wz.style.transition='opacity .5s';wz.style.opacity='0';
    setTimeout(()=>{
      wz.classList.remove('active');wz.style.opacity='1';wz.style.transition='';
      document.getElementById('reveal-btn-wrap').classList.add('show');
      document.getElementById('div-label').textContent='✦ Winners Ready! ✦';
    },500);
  },1200);
}

/* ══ CSV + CAROUSEL ══ */
let allWinners=[],currentPage=1;
const PAGE_SIZE=prize.pageSize;

async function openModal(){
  if(window.LuckyAudio)LuckyAudio.fanfare();
  try{
    const res=await fetch(GH+prize.csv);
    if(!res.ok)throw new Error();
    allWinners=parseCSV(await res.text());
  }catch(e){
    allWinners=demoData();
  }
  currentPage=1;render();
  document.getElementById('modal-overlay').classList.add('open');
  if(window.LuckyAudio){LuckyAudio.duck(true);setTimeout(()=>LuckyAudio.celebrate(),350);}
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  if(window.LuckyAudio)LuckyAudio.duck(false);
}

function parseCSV(txt){
  return txt.trim().split('\n').slice(1).map(l=>{
    const c=(l.match(/(".*?"|[^,]+)(?=,|$)/g)||l.split(',')).map(x=>x.replace(/"/g,'').trim());
    return{name:c[0]||'',mobile:c[1]||'',district:c[2]||'',state:c[3]||''};
  }).filter(r=>r.name);
}

function demoData(){
  const n=['Ramesh Kumar','Suresh Patel','Priya Sharma','Mohan Reddy','Anita Devi','Ravi Shankar','Sunita Yadav','Ajay Singh','Meena Kumari','Dinesh Gowda','Lakshmi Bai','Arjun Rao'];
  const d=['Nashik','Ahmedabad','Jaipur','Hyderabad','Lucknow','Patna','Bhopal','Chandigarh','Mysuru','Pune','Nagpur','Coimbatore'];
  const s=['Maharashtra','Gujarat','Rajasthan','Telangana','Uttar Pradesh','Bihar','Madhya Pradesh','Punjab','Karnataka','Maharashtra','Maharashtra','Tamil Nadu'];
  return Array.from({length:Math.max(PAGE_SIZE*3,12)},(_,i)=>({name:n[i%n.length],mobile:`98${String(76543210+i*111).padStart(8,'0')}`,district:d[i%d.length],state:s[i%s.length]}));
}

function render(){
  const total=allWinners.length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  const start=(currentPage-1)*PAGE_SIZE;
  const pageData=allWinners.slice(start,start+PAGE_SIZE);
  const cc=document.getElementById('carousel-content');

  if(PAGE_SIZE===1){
    /* Single winner card */
    const w=pageData[0]||{};
    cc.innerHTML=`<div class="winner-single">
      <div class="winner-trophy">🏆</div>
      <div class="winner-big-num">#${start+1}</div>
      <div class="winner-card-single">
        <div class="w-name">${w.name||'—'}</div>
        <div class="w-mobile">📱 ${w.mobile||'—'}</div>
        <div class="w-loc">📍 ${w.district||'—'}, ${w.state||'—'}</div>
      </div>
    </div>`;
    document.getElementById('page-label').textContent='Winner';
    document.getElementById('page-num').textContent=currentPage;
    document.getElementById('page-of').textContent=`of ${totalPages}`;
  } else {
    /* Table format for 3rd and Consolation */
    let rows=pageData.map((w,i)=>{
      const n=start+i+1,isTop=(n===1&&currentPage===1);
      return `<tr class="${isTop?'top-win':''}">
        <td><div class="row-num">${n}</div></td>
        <td><div class="td-name">${w.name}</div></td>
        <td><div class="td-mobile">${w.mobile}</div></td>
        <td><div class="td-district">${w.district}</div></td>
        <td><div class="td-state">${w.state}</div></td>
      </tr>`;
    }).join('');
    cc.innerHTML=`<table class="winners-table">
      <thead><tr><th>#</th><th>Name</th><th>Mobile</th><th>District</th><th>State</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
    const rangeEnd=Math.min(start+PAGE_SIZE,total);
    document.getElementById('page-label').textContent=`Winners ${start+1}–${rangeEnd} of ${total}`;
    document.getElementById('page-num').textContent=currentPage;
    document.getElementById('page-of').textContent=`of ${totalPages}`;
  }

  document.getElementById('prev-btn').disabled=currentPage===1;
  document.getElementById('next-btn').disabled=currentPage>=totalPages;
}

function changePage(d){
  const tp=Math.ceil(allWinners.length/PAGE_SIZE)||1;
  const np=Math.max(1,Math.min(tp,currentPage+d));
  if(np!==currentPage&&window.LuckyAudio)LuckyAudio.page();
  currentPage=np;
  render();
}

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
</script>
</body>
</html>
